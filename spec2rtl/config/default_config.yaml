# Spec2RTL Default Configuration
# ================================
# All values here can be overridden by environment variables
# prefixed with SPEC2RTL_ (e.g., SPEC2RTL_DEFAULT_MODEL).

# --- LLM Configuration (API-Agnostic via LiteLLM) ---
# Model identifiers follow LiteLLM format: "provider/model-name"
# Examples: "gemini/gemini-2.5-flash", "openai/gpt-4o",
#           "anthropic/claude-3.5-sonnet", "ollama/llama3"
default_model: "openrouter/minimax/minimax-m2.5"
fallback_models:
  - "openrouter/google/gemini-3.1-flash-lite-preview"
  - "openrouter/google/gemini-3-flash-preview"
  - "openrouter/deepseek/deepseek-v3.2"
  - "openrouter/moonshotai/kimi-k2.5"
max_llm_retries: 3
llm_temperature: 0.0
llm_max_tokens: 8192

# --- Build & Output ---
build_dir: "builds"

# --- HLS Compiler Backend ---
# Options: "google_xls", "bambu", "vitis"
hls_compiler: "google_xls"
xls_docker_image: "cirbuildproject/cirbuild-xls:v1"

# --- Logging ---
log_level: "INFO"
log_dir: "logs"

# --- Agent Orchestration ---
max_agent_rounds: 20
max_reflection_cycles: 3
